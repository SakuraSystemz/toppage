<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Raiole Home Page</title>
        <style>
            /* Color Palette (Original) */
            :root {
                --bg-body: #777785; /* body background-color */
                --bg-paper: #f4f0f0; /* .main background-color */
                --border-paper: #222222; /* .main border color */
                --bg-header: #bb4444; /* .mainhead background-color */

                --text-body: #555555; /* .sub color */
                --text-menu: #444444; /* .menu color */
                --text-link: #222222; /* .menu a color */
                --hover-color: orange; /* .menu a:hover color */

                --footer-text: #ffffff; /* .copy color */
                --footer-link: #ffffcc; /* .copy a color */
            }

            /* Reset & Base Styles */
            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                padding: 20px 0;
                background-color: var(--bg-body);
                font-family: sans-serif;
                color: var(--text-body);
                line-height: 1.6;
            }

            /* リンクの基本設定 */
            a {
                text-decoration: none;
                transition: color 0.2s;
            }

            /* Layout Structure */
            .container {
                width: 100%;
                max-width: 754px;
                margin: 0 auto;
            }

            .paper {
                background-color: var(--bg-paper);
                border: 1px solid var(--border-paper);
            }

            /* Header Section (Red Box */
            header {
                background-color: var(--bg-header);
                padding: 20px;
                text-align: center;
                border-bottom: 1px solid var(--border-paper);
            }

            header h1 {
                margin: 10px 0 5px 0;
                font-family: sans-serif;
                font-size: 25px;
                color: #000;
            }

            .header-link {
                font-family: sans-serif;
                font-size: 12px;
                color: #000;
            }

            .meta-info {
                font-family: sans-serif;
                font-size: 12px;
                color: #000;
                line-height: 1.5;
                margin-top: 15px;
            }

            .meta-info a {
                color: #1155cc;
                text-decoration: underline;
            }

            /* Content Typography */
            .content {
                padding: 20px;
            }

            h2 {
                /* インラインスタイル */
                font-family: sans-serif;
                font-size: 15px;
                font-weight: 700;
                margin-top: 20px;
                margin-bottom: 6pt;
                color: #000;
                padding-left: 1em;
                text-indent: -1em; /* インデント */
            }

            p {
                margin: 0 0 1em 0;
                font-size: 14px;
                text-align: left;
                text-indent: 1em;
            }

            /* 箇条書きのスタイル調整 */
            ul {
                padding-left: 2em;
                margin-bottom: 1em;
            }
            li {
                font-size: 14px;
                margin-bottom: 0.5em;
            }

            /* Navigation / Menu */
            .menu {
                text-align: center;
                font-size: 12px;
                color: var(--text-menu);
                margin-top: 7px;
                padding-bottom: 20px;
                border-top: 1px solid #ddd;
                margin-top: 30px;
            }

            .menu a {
                color: var(--text-link);
                padding: 0 3px;
            }

            .menu a:hover {
                color: var(--hover-color);
            }

            /* Footer (Copy Section) */
            footer {
                font-size: 11px;
                color: var(--footer-text);
                text-align: left;
                line-height: 135%;
                margin-top: 2px;
                padding: 10px 15%;
            }

            footer a {
                color: var(--footer-link);
                padding: 0 10px;
            }

            footer a:hover {
                color: var(--hover-color);
            }

            .footer-nav-center {
                text-align: center;
                margin-bottom: 10px;
            }

            /* Responsive Tweaks */
            @media (max-width: 600px) {
                body {
                    padding: 10px 0;
                }
                header,
                .content {
                    padding: 15px;
                }
                footer {
                    padding: 10px 5%;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="paper">
                <!-- 赤いヘッダーエリア -->
                <header>
                    <h1>Raiole Home Page</h1>
                    <div class="meta-info">
                        <h3 style="text-align: center">Since 2013</h3>
                        <p></p>
                    </div>
                </header>

                <!-- 本文エリア -->
                <div class="content">
                    <h3>whoami</h3>
                    <h2>Raiole</h2>
                    <p>放送大学教養学部教養学科(主に心理、情報)</p>
                    <p>
                        中学1年からのLinuxユーザー、2012年から14年間Linuxユーザー。
                    </p>
                    <hr
                        style="
                            border: 0;
                            border-top: 1px solid #222222;
                            margin: 30px 0;
                        "
                    />
                    <h2>リンク</h2>
                    <ul>
                        <li><h4>Blog</h4></li>
                        <a href="https://sakurasystemz.github.io/blog/"
                            ><img
                                src="img/Raiole-Blog.png"
                                alt="ブログ"
                                style="max-width: 100%; height: auto"
                        /></a>
                        <li><h4>デジタルガーデン(ジャーナル)</h4></li>
                        <a
                            href="https://careful-vinca-185.notion.site/Raiole-journal-327cd369f14180c4b1aac6b055af12f8"
                            ><img
                                src="img/Raiole-journal-top.png"
                                alt="デジタルガーデン"
                                style="max-width: 100%; height: auto"
                        /></a>
                        <li><h4>GitHub</h4></li>
                        <a href="https://github.com/SakuraSystemz"
                            ><img
                                src="img/github-top.png"
                                alt="GitHub"
                                style="max-width: 100%; height: auto"
                        /></a>
                    </ul>
                </div>

                <!-- メニュー -->
                <div class="menu">
                    <!-- 必要であればリンクを追加 -->
                </div>
            </div>
        </div>

        <!-- フッター -->
        <footer>
            <div class="footer-nav-center"></div>
        </footer>
    </body>
</html>
